<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Futuristic Login</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    background:#050816;
    position:relative;
}

body::before{
    content:'';
    position:absolute;
    width:600px;
    height:600px;
    background:linear-gradient(#00f7ff,#0066ff);
    border-radius:50%;
    filter:blur(150px);
    animation:float1 8s ease-in-out infinite;
}

body::after{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:linear-gradient(#ff00ff,#ff006a);
    border-radius:50%;
    filter:blur(150px);
    animation:float2 10s ease-in-out infinite;
}

@keyframes float1{
    50%{
        transform:translate(-150px,-80px);
    }
}

@keyframes float2{
    50%{
        transform:translate(150px,80px);
    }
}

.login-box{
    position:relative;
    width:380px;
    padding:45px;
    border-radius:25px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    overflow:hidden;
    z-index:2;
}

.login-box::before{
    content:'';
    position:absolute;
    inset:-2px;
    border-radius:25px;
    background:conic-gradient(#00f7ff,#0066ff,#ff00ff,#ff006a,#00f7ff);
    animation:spin 4s linear infinite;
}

.login-box::after{
    content:'';
    position:absolute;
    inset:3px;
    border-radius:22px;
    background:rgba(5,8,22,.92);
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.content{
    position:relative;
    z-index:5;
}

h2{
    text-align:center;
    color:white;
    margin-bottom:30px;
    font-size:2em;
    letter-spacing:2px;
}

.input-box{
    position:relative;
    margin-bottom:25px;
}

.input-box input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,.08);
    color:white;
    font-size:15px;
    transition:.3s;
}

.input-box input:focus{
    box-shadow:0 0 20px #00f7ff;
}

.input-box label{
    position:absolute;
    left:15px;
    top:15px;
    color:#aaa;
    pointer-events:none;
    transition:.3s;
}

.input-box input:focus~label,
.input-box input:valid~label{
    top:-10px;
    left:10px;
    font-size:12px;
    color:#00f7ff;
    background:#050816;
    padding:0 5px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#00f7ff,#0066ff);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.4s;
    font-weight:bold;
    position:relative;
    overflow:hidden;
}

button::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:50%;
    height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent);
    transform:skewX(-25deg);
    animation:shine 2s infinite;
}

@keyframes shine{
    100%{
        left:200%;
    }
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 30px #00f7ff;
}

button:disabled{
    opacity:.75;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
}

.loader{
    width:100%;
    margin-top:15px;
    display:none;
    justify-content:center;
    align-items:center;
    gap:8px;
}

.loader span{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#00f7ff;
    animation:bounce .6s infinite alternate;
}

.loader span:nth-child(2){
    animation-delay:.2s;
}

.loader span:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-10px);
        box-shadow:0 0 15px #00f7ff;
    }
}

.bottom{
    text-align:center;
    margin-top:20px;
    color:#aaa;
}

.bottom a{
    color:#00f7ff;
    text-decoration:none;
}

.particle{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    opacity:.5;
    animation:rise linear infinite;
}

@keyframes rise{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100vh);
    }
}
</style>
</head>
<body>

<div class="login-box">
    <div class="content">
        <h2>LOGIN</h2>

        <div class="input-box">
            <input type="text" required>
            <label>Username</label>
        </div>

        <div class="input-box">
            <input type="password" required>
            <label>Password</label>
        </div>

        <button id="loginBtn">Sign In</button>

        <div class="loader" id="loader">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="bottom">
            Don't have an account?
            <a href="#">Register here</a>
        </div>
    </div>
</div>

<script>
for(let i=0;i<80;i++){
    const p=document.createElement("span");
    p.classList.add("particle");
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(Math.random()*10+5)+"s";
    p.style.opacity=Math.random();
    document.body.appendChild(p);
}

const btn = document.getElementById("loginBtn");
const loader = document.getElementById("loader");

btn.addEventListener("click",()=>{
    btn.disabled = true;
    btn.textContent = "Signing In...";
    loader.style.display = "flex";

    setTimeout(()=>{
        loader.style.display = "none";
        btn.textContent = "Sign In";
        btn.disabled = false;
    },3000);
});

btn.addEventListener("mousemove",(e)=>{
    const x=e.offsetX;
    const y=e.offsetY;
    btn.style.background=`radial-gradient(circle at ${x}px ${y}px,#00f7ff,#0066ff)`;
});

btn.addEventListener("mouseleave",()=>{
    btn.style.background="linear-gradient(45deg,#00f7ff,#0066ff)";
});
</script>
</body>
</html>
